# ULTRAMIND TOOL INDEX v2.0.0
# Registry of callable Python/script tools (not loaded into context)
# Philosophy: Skills + Scripts > MCPs | Tools run OUTSIDE context window
tool_index_version: "2.0.0"
updated: "2026-03-04"

# ============================================================
# SUPERMIND HARNESS TOOLS (Terminal Enhancement)
# ============================================================

harness_tools:
  skill_loader:
    name: "Skill Loader"
    version: "1.0.0"
    location: "tools/scripts/skill_loader.py"
    runtime: "python"
    description: "Load XML skills with progressive disclosure (L1-L4 layers)"
    entry_points:
      load:
        command: "python tools/scripts/skill_loader.py"
        args: "<skill_id> [--layer 2] [--format markdown|xml|json]"
        description: "Load skill by ID with specified layers"
      list:
        command: "python tools/scripts/skill_loader.py --list"
        description: "List all available skills"
      manifest:
        command: "python tools/scripts/skill_loader.py --manifest"
        description: "Show skills manifest"

  session_state:
    name: "Session State Manager"
    version: "1.0.0"
    location: "tools/scripts/session_state.py"
    runtime: "python"
    description: "Manage SESSION_STATE.json for workflow tracking"
    entry_points:
      show:
        command: "python tools/scripts/session_state.py show"
        description: "Display current session state"
      set:
        command: "python tools/scripts/session_state.py set <key> <value>"
        description: "Set a state value"
      load_skill:
        command: "python tools/scripts/session_state.py load_skill <skill_id>"
        description: "Mark skill as loaded"
      gc:
        command: "python tools/scripts/session_state.py gc"
        description: "Run garbage collection"
      reset:
        command: "python tools/scripts/session_state.py reset"
        description: "Reset to fresh state"

  cmux:
    name: "CMUX - Claude Multiplexer"
    version: "1.0.0"
    location: "tools/scripts/cmux.py"
    runtime: "python"
    description: "Parallel sub-agent dispatch for 4-Track workflow"
    entry_points:
      dispatch:
        command: "python tools/scripts/cmux.py dispatch <T1|T2|T3|T4> '<task>'"
        description: "Single track dispatch"
      parallel:
        command: "python tools/scripts/cmux.py parallel T2 T3 --task '<task>'"
        description: "Parallel multi-track dispatch"
      chain:
        command: "python tools/scripts/cmux.py chain '<task>'"
        description: "Full T1->T2->T3->T4 chain"
      status:
        command: "python tools/scripts/cmux.py status"
        description: "Show CMUX status and tracks"

  canvas:
    name: "SUPERMIND Canvas"
    version: "1.0.0"
    location: "tools/scripts/canvas.py"
    runtime: "python"
    description: "Terminal visual rendering for workflow state"
    entry_points:
      state:
        command: "python tools/scripts/canvas.py state"
        description: "Visual workflow state"
      skills:
        command: "python tools/scripts/canvas.py skills"
        description: "Skills inventory map"
      neurobox:
        command: "python tools/scripts/canvas.py neurobox"
        description: "6D Neuro-Box visualization"
      track:
        command: "python tools/scripts/canvas.py track <T1|T2|T3|T4>"
        description: "Track detail view"
      mma:
        command: "python tools/scripts/canvas.py mma"
        description: "MMA scorecard template"

  tmux_setup:
    name: "TMUX Layout"
    version: "1.0.0"
    location: "tools/scripts/tmux_setup.sh"
    runtime: "bash (via WSL)"
    description: "Multi-pane terminal layout for SUPERMIND workflow"
    entry_points:
      start:
        command: "wsl bash tools/scripts/tmux_setup.sh"
        description: "Start SUPERMIND TMUX session"

  conductor:
    name: "SUPERMIND Conductor"
    version: "1.0.0"
    location: "tools/scripts/conductor.py"
    runtime: "python"
    description: "Master agent for 4-phase delegation"
    entry_points:
      run:
        command: "python tools/scripts/conductor.py run"
        description: "Process next pending task"
      status:
        command: "python tools/scripts/conductor.py status"
        description: "Show kanban status"
      teams:
        command: "python tools/scripts/conductor.py teams"
        description: "Show team compositions"

  threadex:
    name: "Threadex Memory Layer CLI"
    version: "1.0.0"
    location: "tools/tx.py"
    runtime: "python"
    description: "File-based agentic memory with expertise + production axes. 7-stage SIMS lifecycle."
    entry_points:
      init:
        command: "python tools/tx.py init"
        args: "[--force]"
        description: "Create .threadex/ folder structure + config + seed domains"
      record:
        command: "python tools/tx.py record"
        args: "<domain/subdomain> <content> [--type pattern] [--status observed] [--mma-score N] [--tags a,b] [--project ID]"
        description: "Append a memory record to a domain JSONL file"
      prime:
        command: "python tools/tx.py prime"
        args: "<domain> [--subdomain X] [--format xml|json|text] [--with-guards] [--siblings] [--max-recent N]"
        description: "Output golden + recent patterns as XML context block for skill priming"
      status:
        command: "python tools/tx.py status"
        description: "Show Threadex health summary across all domains and projects"
      project:
        command: "python tools/tx.py project create"
        args: "<name> [--team writer,researcher]"
        description: "Create a new production project scaffold with t1-t4 tracks"
      handoff:
        command: "python tools/tx.py handoff"
        args: "<project_id> <from_track> <to_track> [--agent orchestrator]"
        description: "Create a track handoff record in a project"
      postmortem:
        command: "python tools/tx.py postmortem"
        args: "<project_id> [--agent orchestrator]"
        description: "Create a project postmortem template"
      contest:
        command: "python tools/tx.py contest"
        args: "<domain/subdomain> --record-id <UUID> --reason <text> [--project ID]"
        description: "Mark an existing record as contested"
      deprecate:
        command: "python tools/tx.py deprecate"
        args: "<domain/subdomain> --record-id <UUID> --reason <text> [--superseded-by UUID] [--project ID]"
        description: "Mark an existing record as deprecated"
      forbid:
        command: "python tools/tx.py forbid"
        args: "<domain/subdomain> --record-id <UUID> --reason <text> [--project ID]"
        description: "Mark an existing record as forbidden"
      decay:
        command: "python tools/tx.py decay"
        args: "[--domain X] [--check] [--apply] [--threshold N]"
        description: "Check/apply utility decay flags to records below threshold"
      compact:
        command: "python tools/tx.py compact"
        args: "<domain/subdomain> [--dry-run] [--project ID]"
        description: "Archive deprecated/forbidden records to _compacted/ subdirectory"
      db_init:
        command: "python tools/tx.py db init"
        args: "[--reset]"
        description: "Initialize or reset the SQLite graph database"
      graph_sync:
        command: "python tools/tx.py graph sync"
        args: "[--domain X] [--project X]"
        description: "Rebuild SQLite edges + content index from all JSONL records"
      graph_neighbors:
        command: "python tools/tx.py graph neighbors"
        args: "<uri> [--json]"
        description: "Show incoming/outgoing edges for a node URI"
      graph_broken:
        command: "python tools/tx.py graph broken"
        args: "[--json]"
        description: "Detect broken/orphan edges in the graph"
      hubs:
        command: "python tools/tx.py hubs"
        args: "[--top N] [--json]"
        description: "Show top-N hub nodes ranked by PRU score"
      search:
        command: "python tools/tx.py search"
        args: "<query> [--domain X] [--limit N] [--with-graph] [--json]"
        description: "Full-text search across all records with optional graph enrichment"

  refactor:
    command: "python tools/tx.py refactor"
    args: "<xml_path> [--auto] [--draft] [--domain DOMAIN] [--dry-run] [--json] [--force]"
    description: "Refactor XML skill into Markdown mastery doc + JSONL records"
  refactor_commit:
    command: "python tools/tx.py refactor --commit"
    args: "<mastery_doc.md> [--domain DOMAIN] [--json] [--force]"
    description: "Commit revised mastery doc into JSONL records + graph edges"
# ============================================================
# DESIGN INTELLIGENCE TOOLS
# ============================================================

tools:
  ui_ux_pro_max:
    name: "UI-UX-Pro-Max Design Intelligence"
    version: "2.0.0"
    source: "github.com/nextlevelbuilder/ui-ux-pro-max-skill"
    license: "MIT"
    location: "tools/ui-ux-pro-max/"
    runtime: "python"  # Windows: python (not python3). Python 3.14.0 confirmed.
    requires_venv: false
    external_dependencies: []  # Pure Python 3 stdlib only

    entry_points:
      design_system:
        command: "python3 tools/ui-ux-pro-max/scripts/search.py"
        args: '"<query>" --design-system -p "<project_name>"'
        description: "Generate complete design system recommendation"
        returns: "Structured design system (style, colors, typography, components)"

      domain_search:
        command: "python3 tools/ui-ux-pro-max/scripts/search.py"
        args: '"<query>" --domain <domain>'
        available_domains: [style, prompt, color, chart, landing, product, ux, typography]
        description: "Search specific design domain"
        returns: "Top 3 BM25-ranked matches from domain CSV"

      stack_search:
        command: "python3 tools/ui-ux-pro-max/scripts/search.py"
        args: '"<query>" --stack <stack>'
        available_stacks:
          - html-tailwind
          - react
          - nextjs
          - vue
          - svelte
          - astro
          - shadcn
          - flutter
          - swiftui
          - react-native
          - jetpack-compose
          - nuxtjs
          - nuxt-ui
        description: "Get stack-specific implementation guidelines"
        returns: "Framework-specific best practices and patterns"

      persist_design_system:
        command: "python3 tools/ui-ux-pro-max/scripts/search.py"
        args: '"<query>" --design-system --persist --output-dir design-system/'
        description: "Generate and save design system to MASTER.md"
        returns: "Persisted MASTER.md in design-system/ directory"

      page_override:
        command: "python3 tools/ui-ux-pro-max/scripts/search.py"
        args: '"<query>" --design-system --persist --page "<page_name>" --output-dir design-system/'
        description: "Generate page-specific design override"
        returns: "Persisted page override in design-system/pages/"

    data_inventory:
      domain_csvs: 11
      stack_csvs: 13
      total_records: "~500+ design patterns"
      total_size: "~231KB data + ~60KB scripts"

    integration_notes:
      - "Runs as subprocess, NOT loaded into LLM context"
      - "Output parsed by Strategic Design Master for Neuro-Resonance validation"
      - "Default stack: html-tailwind (matches ULTRAMIND web stack)"
      - "Design system persistence goes to design-system/ directory at project root"
