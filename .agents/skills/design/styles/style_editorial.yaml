# ULTRAMIND Design Style Layer v1.0.0
# Vertical: Advertorials / Listicles | Priority: 3 (Conversion)
# Extracted from UI-UX-Pro-Max + Neuro-Resonance mapped
# Load cost: ~150 tokens | Layer: L2

style_layer:
  name: "Editorial Trust"
  version: "1.0.0"
  vertical: "editorial"
  extends: "STYLE_BASE_OVERRIDE"
  extracted_from: "ui-ux-pro-max"

  quick_reference:
    style_archetype: "Minimal Single Column"
    mood: "trustworthy, clean, editorial"
    best_for: "Health advertorials, listicles, native content, editorial funnels"

  color_palette:
    primary: "#0891B2"
    primary_light: "#22D3EE"
    primary_dark: "#0E7490"
    secondary: "#22D3EE"
    accent: "#22C55E"
    surface_bg: "#ECFEFF"
    surface_card: "#FFFFFF"
    text_primary: "#164E63"
    text_secondary: "#6B7280"
    cta_primary: "#22C55E"
    cta_hover: "#16A34A"

  typography:
    heading_font: "Figtree"
    heading_weight: 600
    body_font: "Noto Sans"
    body_weight: 400
    google_fonts_import: "https://fonts.google.com/share?selection.family=Figtree:wght@300;400;500;600;700|Noto+Sans:wght@300;400;500;700"

  motion:
    entry_style: "fade"
    duration_base: "200ms"
    easing: "ease-out"
    special: "subtle scroll reveals, trust badge animations, CTA pulse on scroll"

  radius:
    default: "8px"
    buttons: "8px"
    cards: "12px"

  neuro_resonance:
    primary_axis: "BODY"
    primary_neurotransmitter: "Dopamine"
    secondary_axis: "MIND"
    emotional_target: "safety, trust, credibility"
    7s_emphasis: ["SAFE", "SMART"]

  anti_patterns:
    - "Flat design without depth"
    - "Text-heavy without visual breaks"
    - "Aggressive/salesy CTA styling"
    - "Missing byline or source attribution"
