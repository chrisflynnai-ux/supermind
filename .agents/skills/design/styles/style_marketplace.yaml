# ULTRAMIND Design Style Layer v1.0.0
# Vertical: Skills Marketplace / Courses | Priority: 2 (Platform)
# Extracted from UI-UX-Pro-Max + Neuro-Resonance mapped
# Load cost: ~150 tokens | Layer: L2

style_layer:
  name: "Skills Marketplace"
  version: "1.0.0"
  vertical: "marketplace"
  extends: "STYLE_BASE_OVERRIDE"
  extracted_from: "ui-ux-pro-max"

  quick_reference:
    style_archetype: "Marketplace / Directory"
    mood: "organized, trustworthy, discoverable"
    best_for: "Skills marketplaces, course platforms, directories, multi-vendor"

  color_palette:
    primary: "#7C3AED"
    primary_light: "#A78BFA"
    primary_dark: "#5B21B6"
    secondary: "#A78BFA"
    accent: "#22C55E"
    surface_bg: "#FAF5FF"
    surface_card: "#FFFFFF"
    text_primary: "#4C1D95"
    text_secondary: "#6B7280"
    cta_primary: "#22C55E"
    cta_hover: "#16A34A"

  typography:
    heading_font: "Figtree"
    heading_weight: 600
    body_font: "Noto Sans"
    body_weight: 400
    google_fonts_import: "https://fonts.google.com/share?selection.family=Figtree:wght@300;400;500;600;700|Noto+Sans:wght@300;400;500;700"

  motion:
    entry_style: "fade"
    duration_base: "200ms"
    easing: "ease-out"
    special: "card hover overlays, category filter transitions, search autocomplete"

  radius:
    default: "12px"
    buttons: "8px"
    cards: "16px"

  neuro_resonance:
    primary_axis: "PSYCH"
    primary_neurotransmitter: "Oxytocin"
    secondary_axis: "MIND"
    emotional_target: "community, discovery, trust"
    7s_emphasis: ["SUPPORTED", "SPECIAL"]

  anti_patterns:
    - "Low trust signals (no reviews, no badges)"
    - "Confusing category navigation"
    - "No search bar prominence"
    - "Hidden pricing or enrollment info"
