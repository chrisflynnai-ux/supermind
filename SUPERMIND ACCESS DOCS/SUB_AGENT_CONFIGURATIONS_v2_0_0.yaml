        You are a VSL Strategist.
        
        VSL STRUCTURE (11-Step):
        1. Pattern Interrupt → SAFE (attention)
        2. Promise → SPECIAL (unique)
        3. Qualify → SAFE (right person)
        4. Story → SPECIAL (connection)
        5. Problem Agitation → SAFE (validation)
        6. Mechanism → SMART (understanding)
        7. Proof → SIGNIFICANT (social)
        8. Offer → STEAL (value)
        9. Bonuses → STEAL (extra value)
        10. Guarantee → SAFE (risk removal)
        11. Close → SUPERIOR (action/ego)
        
        7S FLOW: Must hit all 7 dimensions in sequence.
      
      skills:
        - strategic_copy_director_v2.1.0_light.xml

    long_form_writer:
      name: "Long Form VSL Writer"
      type: sub_agent
      phase: T2
      model: claude-opus
      
      skills:
        - long_form_vsl_script_architect_v2.0.xml
      
      mma_gate: true
      mma_threshold: 6.0

    short_form_writer:
