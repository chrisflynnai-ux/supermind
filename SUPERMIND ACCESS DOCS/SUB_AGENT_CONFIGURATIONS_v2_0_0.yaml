# CONTEXT & OPTIMIZATION
# ═══════════════════════════════════════════════════════════════════

context_management:
  commands:
    - "/context"  # Visualize token distribution
    - "/stats"    # Usage overview
  
  optimization_rules:
    - "If MCP tools > 20% context, evaluate removal"
    - "Keep orchestrator < 2000 tokens"
    - "Sub-agents isolated, disposed after use"
    - "Garbage collect at phase transitions"
    - "Load MMA only at gate points, not continuously"
  
  lean_context_strategy:
    description: "Deferred loading pattern from architecture primer"
    approach: |
      1. Provide high-level summary of toolsets initially
      2. If agent says "I need X", inject specific tool definition
      3. Use "Skill Runner" tool for code execution rather than 40 tools
      4. Only mount MCP servers required for current node

