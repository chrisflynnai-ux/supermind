# Updated: 2026-01-07
#
# WHAT'S NEW IN v2.0.0:
# - Added MMA (Master Monitor Agent) as quality gate at every phase
# - Updated all skill references to v2.1.0
# - Added Pydantic AI agent definitions
# - Added LangGraph workflow integration
# - Added CopilotKit/AG-UI hooks for HITL
# - Added 7S/7F Chain validation in MMA checks
# - Added Neuro-Resonance Auditor integration
# - Added Evidence Pack Builder integration
# - Aligned with ULTRAMIND 4-Track Architecture v4.0 (patched from 3-Axis v2.1)
