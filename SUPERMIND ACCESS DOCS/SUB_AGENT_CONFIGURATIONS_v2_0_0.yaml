# ═══════════════════════════════════════════════════════════════════
# LANGGRAPH WORKFLOW DEFINITIONS
# ═══════════════════════════════════════════════════════════════════

langgraph_workflows:
  description: "LangGraph workflow configurations for each pod"
  
  advertorial_workflow:
    nodes:
      - id: "angle_finder"
        agent: "advertorial_pods.draft.angle_finder"
        next: "draft_writer"
      - id: "draft_writer"
        agent: "advertorial_pods.draft.draft_writer"
        next: "mma_draft_gate"
      - id: "mma_draft_gate"
        agent: "mma_master_monitor"
        mode: "M1_quick_score"
        conditional_next:
          PASS: "production_builder"
          FIX: "draft_writer"
          ESCALATE: "human_gate"
      - id: "production_builder"
        agent: "advertorial_pods.production.builder"
        next: "mma_production_gate"
      - id: "mma_production_gate"
        agent: "mma_master_monitor"
        mode: "M2_deep_audit"
        conditional_next:
          PASS: "voice_editor"
          FIX: "production_builder"
          ESCALATE: "human_gate"
      - id: "voice_editor"
        agent: "advertorial_pods.polish.voice_editor"
        next: "final_qa"
      - id: "final_qa"
        agent: "advertorial_pods.polish.final_qa"
        mode: "M4_compliance_gate"
        next: "END"
      - id: "human_gate"
        type: "HITL"
        copilotkit_hook: "useApproval"
    
    breakpoints:
      - after: "mma_draft_gate"
        copilotkit_state: "draft_review"
      - after: "mma_production_gate"
        copilotkit_state: "production_review"

  salespage_workflow:
    nodes:
      - id: "strategy"
        agent: "salespage_pods.draft.strategy"
        next: "draft_writer"
      - id: "draft_writer"
        agent: "salespage_pods.draft.writer"
        next: "mma_draft_gate"
      # ... similar pattern

# ═══════════════════════════════════════════════════════════════════
# COPILOTKIT / AG-UI INTEGRATION
# ═══════════════════════════════════════════════════════════════════

copilotkit_integration:
  description: "CopilotKit v1.5 + AG-UI configuration for HITL"
  
  hooks:
    useAgent:
      description: "Subscribe to LangGraph/Pydantic AI state"
      usage: |
        const { state, actions } = useAgent({
          agentId: 'advertorial_workflow',
          onStateChange: (newState) => {
            // Update UI with MMA scores, 7S coverage, etc.
          }
        });
    
    useApproval:
      description: "Human-in-the-loop approval gates"
      triggers:
        - "mma_draft_gate"
        - "mma_production_gate"
        - "human_gate"
    
    useSourceValidation:
      description: "Approve/reject specific chunks before next stage"
      usage: |
        // Before agent 'Polishes', display chunks for approval
        const { chunks, approve, reject } = useSourceValidation();

  generative_ui:
    description: "AG-UI components for rich rendering"
    components:
      - MMAScorecard: "Display 7D scores with visual indicators"
      - SevenSCoverage: "Heatmap of 7S dimension coverage"
      - DriftReport: "Visual cross-asset consistency matrix"
      - AssetPreview: "Formatted preview cards for copy"

# ═══════════════════════════════════════════════════════════════════
# PYDANTIC AI AGENT SCHEMAS
# ═══════════════════════════════════════════════════════════════════

pydantic_schemas:
  description: "Pydantic AI model definitions for type-safe agents"
  
  MMAScorecard:
    fields:
      - name: asset_name
        type: str
      - name: mode
        type: "Literal['M1', 'M2', 'M3', 'M4', 'M5']"
      - name: dimension_scores
        type: "Dict[str, float]"
      - name: weighted_average
        type: float
      - name: seven_s_scores
        type: "Dict[str, float]"
      - name: verdict
        type: "Literal['PASS', 'FIX', 'ESCALATE']"
      - name: routing
        type: "Optional[str]"
      - name: fix_instructions
        type: "List[str]"
      - name: is_polished
        type: bool
  
  OrchestrationResult:
    fields:
      - name: run_id
        type: str
      - name: project_id
        type: str
      - name: current_phase
        type: "Literal['T1', 'T2', 'T3', 'T4']"
      - name: artifacts
        type: "Dict[str, Any]"
      - name: mma_history
        type: "List[MMAScorecard]"
      - name: next_action
        type: str
  
  ResonanceCritique:
    description: "For self-annealing reviewer pattern"
    fields:
      - name: resonance_score
        type: int
        description: "0-10 score on persona mirroring"
      - name: triggers_found
        type: "List[str]"
        description: "Psychological triggers detected"
      - name: friction_points
        type: "List[str]"
        description: "Phrases causing skepticism"
      - name: seven_s_gaps
        type: "List[str]"
        description: "Missing 7S dimensions"
      - name: required_fixes
        type: "List[str]"
        description: "Step-by-step annealing instructions"
      - name: is_polished
        type: bool

