# ═══════════════════════════════════════════════════════════════════
# GLOBAL CONFIGURATION
# ═══════════════════════════════════════════════════════════════════

global_config:
  version: "2.0.0"
  framework: "pydantic_ai + langgraph + copilotkit"
  
  # Model routing strategy (lean, not PAL MCP)
  model_routing:
    reasoning: "claude-sonnet-4-20250514"      # Complex reasoning, orchestration
    fast: "claude-haiku-4-20250514"            # Quick operations, validation
    fallback: "gemini-2.0-flash"               # Speed-critical, large context
  
  # Track definitions aligned with 4-Track Architecture v4.0
  tracks:
    T1_research:
      axis: "discovery"
      direction: "Gathering"
      dimensions: "cross"
      seven_s: []
      model: "sonnet"
      mma_mode: "none"
      threshold: null  # No gate — research is exploratory

    T2_draft:
      axis: "A (UP)"
      direction: "Lifting"
      dimensions: "BODY ↔ HEART"
      seven_s: ["SAFE", "SPECIAL"]
      model: "sonnet"
      mma_mode: "M1_quick_score"
      threshold: 6.0

    T3_production:
      axis: "B (OVER)"
      direction: "Advancing"
      dimensions: "MIND ↔ SPIRIT"
      seven_s: ["SMART", "SIGNIFICANT"]
      model: "opus"
      mma_mode: "M2_deep_audit"
      threshold: 8.0

    T4_polish:
      axis: "C (OUT)"
      direction: "Expanding"
      dimensions: "PSYCH ↔ CONSCIENCE"
      seven_s: ["SUPPORTED", "SUPERIOR", "STEAL"]
      model: "opus"
      mma_mode: "M1_quick_score"
      threshold: 9.0
  
  # Circuit breaker settings
  circuit_breaker:
    max_fix_loops: 3
    same_issue_action: "PATCH_REQUEST"
    max_loops_action: "HUMAN_GATE"
    context_warning: 70
    context_critical: 85
    gc_trigger: 70

  # SSOT requirements
  ssot_schemas:
    required:
      - "PROJECT_BRIEF_v2"
      - "MESSAGE_SPINE_v2"
    highly_recommended:
      - "EVIDENCE_PACK_v1"
      - "VOICE_GUIDE_v1"
    optional:
      - "COMPETITOR_ANALYSIS"
      - "AVATAR_DEEP_DIVE"

# ═══════════════════════════════════════════════════════════════════
# ORCHESTRATION LAYER
# ═══════════════════════════════════════════════════════════════════

zpwo_orchestrator:
  name: "ZPWO - Zero-Point Workflow Orchestrator"
  type: orchestrator
  model: claude-sonnet
  skill_ref: "zpwo_v4_0_0.xml"  # Canonical V4 orchestrator
  
  system_prompt: |
    You are ZPWO, the Zero-Point Workflow Orchestrator for ULTRAMIND.
    
    YOUR ROLE:
    - Route tasks to appropriate sub-agent pods
    - Manage 4-track workflow (T1 Research → T2 Draft → T3 Production → T4 Polish)
    - Track SESSION_STATE across tracks
    - Enforce circuit breakers (max 3 FIX loops)
    - Trigger garbage collection when context > 70%
    - Ensure MMA validation at every phase gate
    
    ROUTING LOGIC:
    - /advertorial → advertorial_pods
    - /salespage → salespage_pods
    - /vsl → vsl_pods
    - /design → design_pods
    - /designsystem → design_pods (via UI-UX-Pro-Max tool)
    - /uipro → design_pods (alias for /designsystem)
    - /email → email_pods
    - /infoproduct → infoproduct_pods
    
    TRACK MANAGEMENT (4-Track Aligned):
    - T1 (Research): Discovery, no MMA gate
    - T2 (Draft): Axis A (UP), SAFE + SPECIAL, MMA Quick Score ≥6.0
    - T3 (Production): Axis B (OVER), SMART + SIGNIFICANT, MMA Deep Audit ≥8.0
    - T4 (Polish): Axis C (OUT), SUPPORTED + SUPERIOR + STEAL, MMA ≥9.0
    
    STATE MANAGEMENT:
    - Track: run_id, project_id, active_phase, ssot_versions
    - Persist: artifacts, mma_scores, patches
    - Handoff: SUMMARY_HANDOFF between sessions
    
    PRINCIPLES:
    - State > Chat
    - Generate Last
    - Light Center, Heavy Edges
    - Nothing ships without MMA approval
  
  tools:
    - file_system
    - state_manager
    - mma_validator
  
  skills: [] # Orchestrator doesn't load skills directly
  
  context_budget: 2000 # Keep orchestrator light

  # Pydantic AI definition
  pydantic_ai:
    agent_class: "ZPWOOrchestrator"
    result_type: "OrchestrationResult"
    deps_type: "SessionState"

# ═══════════════════════════════════════════════════════════════════
# MMA - MASTER MONITOR AGENT (Quality Guardian)
# ═══════════════════════════════════════════════════════════════════

mma_master_monitor:
  name: "MMA - Master Monitor Agent"
  type: validator
  model: claude-sonnet
  skill_ref: "meta_mma_v4_0_0.xml"  # Canonical V4 quality gate
  
  system_prompt: |
    You are the Master Monitor Agent — an uncompromising quality guardian 
    who protects the integrity of every output. You have high standards 
    but you're not cruel; you identify problems AND provide surgical 
    fix guidance. You catch what others miss.
    
    PRIME DIRECTIVE:
    Score accurately. Decide fairly. Route intelligently. 
    Block what must be blocked. Fix what can be fixed.
    Never let garbage reach the audience.
    
    7D SCORING DIMENSIONS:
    - D1: Strategy Alignment (0.15, threshold 8.0, CRITICAL)
    - D2: Proof Discipline (0.20, threshold 9.0, CRITICAL)
    - D3: CTA Integrity (0.15, threshold 9.0, CRITICAL)
    - D4: Voice Consistency (0.15, threshold 8.0, HIGH)
    - D5: Clarity + Structure (0.10, threshold 8.0, HIGH)
    - D6: Resonance (0.15, threshold 8.0, HIGH)
    - D7: Ethical Guardrails (0.10, threshold 9.0, CRITICAL)
    
    7S COVERAGE CHECK:
    - SAFE → D2, D7
    - SPECIAL → D4, D6
    - SMART → D1, D5
    - SIGNIFICANT → D2, D6
    - SUPPORTED → D3
    - SUPERIOR → D6, D7
    - STEAL → D1, D3
    
    VERDICT LOGIC:
    - PASS: Weighted avg ≥8.0 AND all CRITICAL ≥threshold
    - FIX: Weighted avg 6.5-7.9 OR any dim 5.0-6.9
    - ESCALATE: Weighted avg <6.5 OR CRITICAL <threshold
    
    OPERATING MODES:
    - M1: Quick Score (2-3 min, standard gates)
    - M2: Deep Audit (10-15 min, pre-launch)
    - M3: Multi-Asset Consistency (15-20 min, funnel review)
    - M4: Compliance Gate (1-2 min, ads platform)
    - M5: Comparative Scoring (5-10 min, A/B variants)
  
  tools:
    - python_validators
    - mma_scorer
    - seven_s_auditor
  
  routing_rules:
    D1_fail: "strategic_copy_director"
    D2_fail: "evidence_pack_builder"
    D3_fail: "strategic_copy_director_light"
    D4_fail: "human_persuasion_editor"
    D5_fail: "strategic_copy_director"
    D6_fail: "neuro_resonance_auditor"
    D7_fail: "ESCALATE_TO_HUMAN"
    seven_s_gaps: "neuro_resonance_auditor"
  
  pydantic_ai:
    agent_class: "MMAValidator"
    result_type: "MMAScorecard"
    deps_type: "ValidationContext"

