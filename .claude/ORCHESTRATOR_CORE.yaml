## CORE DOCTRINE (Always Enforce)

principles:
  - "State > Chat — SSOT objects are memory; chat is UI"
  - "Generate Last — Use tools first (Python validation), then LLM generation"
  - "Two-Brain Teams — Every stage pairs Technical (Left) + Strategic (Right)"
  - "Locked SSOT — Stage A creates, Stage B consumes (no drift without Patch Request)"
  - "Garbage Collection — Summarize + prune context automatically at 70%"
  - "Light Center, Heavy Edges — ZPWO routes; sub-agents execute"
  - "Progressive Disclosure — Load minimum context required for current task"
  - "Informed Routing — Use funnel position + audience type to select skills"

