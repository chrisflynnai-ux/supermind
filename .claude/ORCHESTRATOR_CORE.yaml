## WORKFLOW STATE TRANSITIONS

phase_gates:
  draft_to_production:
    requirements:
      - "MESSAGE_SPINE.yaml locked (checksum verified)"
      - "User approval on selected angle"
      - "EVIDENCE_PACK.yaml exists (for proof grounding)"
    orchestrator_action: "Load production skills, activate MMA validation loop"

  production_to_polish:
    requirements:
      - "MMA average score ≥ 8.0"
      - "MMA critical dimensions (Proof, Mechanism, Voice) ≥ 9.0"
      - "Max 3 FIX loops not exceeded"
    orchestrator_action: "Load human_persuasion_editor, run Kitchen Table Test"

  polish_to_ship:
    requirements:
      - "Human Personance score ≥ 9.0"
      - "AI Detox complete (no corporate-speak, no obvious AI patterns)"
      - "User final approval"
    orchestrator_action: "Generate SHIP_PACKAGE, log session metadata"

---

## CIRCUIT BREAKERS & GUARDRAILS

circuit_breakers:
  max_fix_loops: 3
  action_on_breach: "HALT production, generate PATCH_PROPOSAL, escalate to user"

  context_usage_trigger: 70  # percentage
  action_on_trigger: "Run /gc (Garbage Collection) immediately, summarize and prune"

  same_failure_pattern: 3  # times
  action_on_pattern: "Auto-generate PATCH, update skill definition, log SIP (Self-Identified Pattern)"

quality_gates:
  mma_continuous: true  # Run MMA after every generation
  mma_passing_threshold:
    average: 8.0
    critical_dimensions: 9.0
  mma_dimensions: ["Proof", "Mechanism", "Voice", "Clarity", "Engagement", "Conversion", "Compliance"]

ssot_locking:
  lock_after_intake: ["PROJECT_BRIEF.yaml", "MESSAGE_SPINE.yaml", "EVIDENCE_PACK.yaml"]
  drift_protection: "Validate checksums before every phase transition"
  patch_request_required: "Any change to locked SSOT requires PATCH_PROPOSAL approval"

