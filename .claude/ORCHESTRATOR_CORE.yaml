## PROGRESSIVE DISCLOSURE LAYERS

layer_strategy:
  L0_always_loaded:
    - "ORCHESTRATOR_CORE.yaml (this file)"
    - "SESSION_STATE.json (runtime state)"
    - "CLAUDE.md (architectural vision)"

  L1_skill_index:
    - "SKILLS_MANIFEST.yaml (lightweight index only, no full logic)"
    - "Skill names, categories, readiness status"

  L2_skill_execution:
    - "Full skill XML loaded ONLY when triggered by user command"
    - "Unloaded after completion (Garbage Collection)"

  L3_ssot_checksums:
    - "SSOT file checksums kept in memory (not full contents)"
    - "Full SSOT loaded only when skill requires it"

  L4_heavy_context:
    - "EVIDENCE_PACK contents (only during production phase)"
    - "COMPETITOR_ANALYSIS (only if needed for differentiation)"

context_budget:
  target: "Keep orchestrator core < 10% of total context"
  measurement: "Token count of L0 files should be < 20k tokens"
  gc_threshold: "70% context usage triggers automatic cleanup"

