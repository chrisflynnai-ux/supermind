## DIMENSIONAL ROUTING LOGIC

routing_rules:
  if_audience_is_cold:
    funnel_stage: "top_of_funnel"
    primary_dimension: MIND (Resonance)
    primary_brain: "Left (Technical - analysis of hooks/patterns)"
    skills: ["viral_resonance_analyzer", "hook_template_generator"]

  if_audience_is_warm:
    funnel_stage: "middle_of_funnel"
    primary_dimensions: [MIND, SPIRIT]  # Resonance + Persuasion
    both_brains: true
    skills: ["advertorial_copy_master", "viral_thread_deconstructor"]

  if_audience_is_hot:
    funnel_stage: "bottom_of_funnel"
    primary_dimension: SPIRIT (Persuasion)
    primary_brain: "Right (Strategic - conversion copy)"
    skills: ["sales_page_copywriter", "email_campaign_copy_genius"]

  if_b2c_personal:
    tone: "personal"
    voice: "conversational, empathetic, benefit-focused"
    primary_dimension: SPIRIT (Persuasion with emotion)

  if_b2b_professional:
    tone: "professional"
    voice: "authoritative, data-driven, ROI-focused"
    primary_dimension: MIND (Resonance with logic + proof)

  if_editorial_content:
    tone: "educational"
    voice: "informative, journalistic, non-salesy"
    primary_dimension: MIND (Resonance for trust-building)

