## ECR (END CYCLE RECURSION) TRIGGERS

ecr_activation:
  trigger: "Project marked COMPLETE (asset shipped)"

  learning_phase:
    actions:
      - "Extract SIPs (Self-Identified Patterns) from session logs"
      - "Analyze MMA failure patterns across dimensions"
      - "Review context bloat triggers and GC frequency"
      - "Catalog Human-Corrected Events (manual interventions)"
    output: "LEARNING_REPORT.yaml"

  repair_phase:
    actions:
      - "Rate identified issues by severity and frequency"
      - "Generate PATCH proposals for skill improvements"
      - "Update ORCHESTRATOR_CORE if routing logic failed"
      - "Enhance SSOT schemas if drift occurred"
    output: "REPAIR_PATCHES.yaml"

  integration:
    action: "Merge approved patches into next project cycle"
    versioning: "Increment ORCHESTRATOR_CORE version (e.g., v4.1 → v4.2)"

